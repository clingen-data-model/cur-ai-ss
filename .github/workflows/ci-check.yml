name: Run Continuous Integration Tests

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/uv.lock
          **/pyproject.toml

    - name: Sync dependencies
      run: uv sync --locked --python-preference=system --group dev

    - name: Create /var/caa
      run: |
        sudo mkdir -p /var/caa
        sudo chown -R $USER:$USER /var/caa

    - name: Lint with ruff
      run: uv run ruff check lib

    - name: Type check with mypy
      run: uv run mypy lib

    - name: Format check with ruff
      run: uv run ruff format --check lib test

    - name: Run tests with coverage
      run: uv run python3 -m pytest test --cov=lib --cov-report=term-missing --cov-report=xml
      env:
        ENV_FILE: .env.test

